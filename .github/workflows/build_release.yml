name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Download Dalamud stubs
        run: |
          Invoke-WebRequest -Uri "https://goatcorp.github.io/dalamud-distrib/stubs/latest.zip" -OutFile "latest.zip"
          Expand-Archive -Path "latest.zip" -DestinationPath "$env:APPDATA\XIVLauncher\addon\Hooks\dev" -Force
        shell: pwsh

      - name: Restore dependencies
        run: dotnet restore TargetLines.sln

      - name: Build Release
        run: dotnet build TargetLines.sln --configuration Release --no-restore

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: TargetLines/bin/TargetLines.zip
          generate_release_notes: true
